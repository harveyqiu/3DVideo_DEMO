<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>最终产品展示页</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-mode="final" class="final-page">
    <div id="app" class="final-app">
      <main class="stage-wrap final-stage">
        <canvas id="stage" aria-label="产品展示画面"></canvas>
        <div id="mediaOverlay" class="media-overlay" aria-hidden="true"></div>
        <audio id="sceneAudio" preload="auto"></audio>
        <div id="stageSubtitle" class="stage-subtitle final-subtitle" aria-live="polite"></div>

        <section class="final-camera-module" aria-label="摄像头模块">
          <div class="final-camera-head">
            <button id="cameraButton" type="button">开启摄像头</button>
            <span id="cameraDiagnostics">摄像头未开启</span>
          </div>
          <video id="cameraPreview" autoplay playsinline muted></video>
          <select id="cameraSelect" aria-label="选择摄像头">
            <option value="">默认摄像头</option>
          </select>
          <strong id="trackingState">未连接摄像头</strong>
          <span id="trackingMeta">等待视觉输入</span>
        </section>

        <section class="final-group-rail" aria-label="选择场景组">
          <div class="final-group-rail-head">
            <strong>视频选择</strong>
          </div>
          <div id="finalSceneGroupCards" class="final-group-cards"></div>
          <select id="finalSceneGroupSelect" aria-label="选择场景组">
            <option value="default-group">默认场景组</option>
          </select>
        </section>

        <div class="final-control-dock">
          <button
            id="playPauseButton"
            class="play-pause-button paused"
            type="button"
            aria-label="播放画面"
            title="播放 / 暂停"
          >
            <span class="pause-icon" aria-hidden="true"></span>
            <span class="play-icon" aria-hidden="true"></span>
          </button>

          <section class="final-interaction" aria-label="互动输入">
            <div class="final-input-row">
              <button id="voiceButton" class="voice-round-button" type="button">语音</button>
              <textarea
                id="voiceTextInput"
                rows="2"
                placeholder="说出或输入你的选择，例如：我想找火。"
              ></textarea>
              <button id="voiceTextSendButton" type="button">发送</button>
            </div>
            <span id="voiceStatus">等待输入。提到“火”进入场景2，提到“水”进入场景3。</span>
            <p id="voiceTranscript"></p>
            <p id="voiceReply"></p>
          </section>
        </div>

        <div id="finalIntroModal" class="final-intro-modal" role="dialog" aria-modal="true" aria-labelledby="finalIntroTitle">
          <div class="final-intro-card">
            <button id="finalIntroClose" class="final-intro-close" type="button" aria-label="关闭说明">×</button>
            <h1 id="finalIntroTitle">你好！这是一个 3D 互动视频。</h1>
            <p>先花半分钟看一下怎么使用，准备好了就可以开始体验。</p>
            <ol>
              <li>这个页面会通过摄像头采集面部信息来改变画面视角。请先点击左上角的“开启摄像头”，并在浏览器弹窗中选择“允许”。</li>
              <li>左下角是对话模块。主人公向你提问时，可以点击“语音”直接说话；如果不方便开口，也可以输入文字后点击“发送”。</li>
              <li>左下角圆形按钮控制整个页面的播放和暂停。页面已先为你暂停，关闭这个提示后，点击“播放”就可以开始。</li>
            </ol>
            <button id="finalIntroPrimary" class="final-intro-primary" type="button">知道了</button>
          </div>
        </div>
      </main>

      <div class="hidden-controls" aria-hidden="true">
        <input id="fileInput" type="file" />
        <button id="autoLayoutButton" type="button"></button>
        <button id="saveLayoutButton" type="button"></button>
        <button id="saveAsLayoutButton" type="button"></button>
        <input id="sceneAudioInput" type="file" />
        <span id="sceneAudioName"></span>
        <input id="gifLoopToggle" type="checkbox" checked />
        <input id="audioLoopToggle" type="checkbox" checked />
        <input id="webmLoopToggle" type="checkbox" checked />
        <input id="ageRequiredToggle" type="checkbox" />
        <input id="realtimeReplyToggle" type="checkbox" />
        <select id="sceneEndMode">
          <option value="none">none</option>
          <option value="auto">auto</option>
          <option value="dialog">dialog</option>
        </select>
        <select id="sceneNextSceneSelect"><option value="">none</option></select>
        <div data-flow-route>
          <input data-flow-keywords type="text" />
          <select data-flow-scene><option value="">none</option></select>
        </div>
        <select id="sceneSelect"><option value="default">默认场景</option></select>
        <input id="sceneNameInput" type="text" value="默认场景" />
        <button id="exportButton" type="button"></button>
        <button id="deleteButton" type="button"></button>
        <div id="layerList"></div>
        <button id="micLevelButton" type="button"></button>
        <span id="micLevelStatus"></span>
        <span id="micLevelBar"></span>
        <pre id="kimiRequestDebug"></pre>
        <pre id="kimiResponseDebug"></pre>
        <p id="voiceCaptionPreview"></p>
        <select id="scriptBeatSelect"><option value="opening">opening</option></select>
        <input id="focalRange" type="range" min="0" max="100" value="50" />
        <input id="parallaxRange" type="range" min="0" max="100" value="51" />
        <input id="gridToggle" type="checkbox" checked />
        <input id="xRange" type="range" min="0" max="100" value="50" />
        <input id="yRange" type="range" min="0" max="100" value="50" />
        <input id="zRange" type="range" min="0" max="100" value="21" />
        <input id="scaleRange" type="range" min="0" max="100" value="47" />
        <input id="rotationRange" type="range" min="0" max="100" value="50" />
        <input id="tiltRange" type="range" min="0" max="100" value="50" />
        <span id="focalValue"></span>
        <span id="parallaxValue"></span>
        <span id="xValue"></span>
        <span id="yValue"></span>
        <span id="zValue"></span>
        <span id="scaleValue"></span>
        <span id="rotationValue"></span>
        <span id="tiltValue"></span>
        <span id="layoutStatus"></span>
      </div>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
