<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三维演示页</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-mode="viewer" class="viewer-page">
    <div id="app" class="viewer-app">
      <main class="stage-wrap viewer-stage">
        <canvas id="stage" aria-label="三维演示画布"></canvas>
        <div id="mediaOverlay" class="media-overlay" aria-hidden="true"></div>

        <div class="viewer-toolbar">
          <label>
            <span>演示场景</span>
            <select id="sceneSelect">
              <option value="default">默认场景</option>
            </select>
          </label>
          <button id="viewerStartButton" type="button">开启视线追踪</button>
          <span id="layoutStatus">正在读取场景</span>
        </div>
      </main>

      <div class="hidden-controls" aria-hidden="true">
        <input id="fileInput" type="file" />
        <button id="cameraButton" type="button"></button>
        <button id="autoLayoutButton" type="button"></button>
        <button id="saveLayoutButton" type="button"></button>
        <button id="saveAsLayoutButton" type="button"></button>
        <input id="sceneNameInput" type="text" value="默认场景" />
        <button id="exportButton" type="button"></button>
        <button id="deleteButton" type="button"></button>
        <div id="layerList"></div>
        <video id="cameraPreview" autoplay playsinline muted></video>
        <select id="cameraSelect"><option value="">默认摄像头</option></select>
        <span id="cameraDiagnostics"></span>
        <strong id="trackingState"></strong>
        <span id="trackingMeta"></span>
        <button id="voiceButton" type="button"></button>
        <span id="voiceStatus"></span>
        <p id="voiceTranscript"></p>
        <p id="voiceReply"></p>
        <select id="scriptBeatSelect"><option value="opening">opening</option></select>
        <input id="focalRange" type="range" min="0" max="100" value="50" />
        <input id="parallaxRange" type="range" min="0" max="100" value="51" />
        <input id="gridToggle" type="checkbox" checked />
        <input id="xRange" type="range" min="0" max="100" value="50" />
        <input id="yRange" type="range" min="0" max="100" value="50" />
        <input id="zRange" type="range" min="0" max="100" value="21" />
        <input id="scaleRange" type="range" min="0" max="100" value="47" />
        <input id="rotationRange" type="range" min="0" max="100" value="50" />
        <input id="tiltRange" type="range" min="0" max="100" value="50" />
        <span id="focalValue"></span>
        <span id="parallaxValue"></span>
        <span id="xValue"></span>
        <span id="yValue"></span>
        <span id="zValue"></span>
        <span id="scaleValue"></span>
        <span id="rotationValue"></span>
        <span id="tiltValue"></span>
      </div>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
